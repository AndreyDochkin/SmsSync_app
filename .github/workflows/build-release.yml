name: Build APK

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmsSync-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: SmsSync-debug-apk

      - name: Extract version from tag
        id: get_version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: |
          mv app-debug.apk SmsSync-${{ steps.get_version.outputs.version }}.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: SmsSync v${{ steps.get_version.outputs.version }}
          body: |
            ## SmsSync v${{ steps.get_version.outputs.version }}

            Lightweight Android app that forwards incoming SMS to a Telegram chat in real-time.

            ### Features
            - Real-time SMS to Telegram forwarding
            - Multi-SIM detection with carrier/custom naming
            - Sender blacklist with wildcard support
            - Customizable message template
            - Battery level placeholder
            - Auto-retry with exponential backoff
            - In-app test mode
            - Battery optimization prompt
          files: |
            SmsSync-${{ steps.get_version.outputs.version }}.apk
          draft: false
          prerelease: false
